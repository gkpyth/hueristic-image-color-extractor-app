<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Hueristic - Extract Color Palettes from Any Image</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    </head>

    <body>
        <!-- HEADER -->
        <header class="site-header">
            <h1 class="logo">
                <span class="logo-hue">Hue</span><span class="logo-ristic">ristic</span>
            </h1>
            <p class="tagline">Extract color palettes from any image.</p>
        </header>

        <!-- MAIN CONTENT -->
        <main class="container">

            <!-- UPLOAD SECTION -->
            <section class="upload-section" id="upload-section">
                <!-- Hidden file input - trigger it via a styled label below -->
                <input type="file" id="file-input" accept="image/png, image/jpg, image/jpeg, image/webp" hidden>

                <label for="file-input" class="upload-label">
                    <span class="upload-icon">+</span>
                    <span class="upload-text">Choose an image or drag & drop here</span>
                    <span class="upload-hint">PNG, JPEG, or WebP · up to 10MB</span>
                </label>

            <!-- Sample images - one-click demos for visitors without an image handy. -->
            <!-- data-src holds the path so main.js can fetch and process it like -->
            <!-- a regular upload. data-credit is shown in a tooltip on hover. -->
            <div class="samples">
                <p class="samples-label">or try one of these</p>
                <div class="samples-grid">
                    <button type="button" class="sample-thumb"
                            data-src="{{ url_for('static', filename='images/samples/sunset.jpg') }}"
                            data-credit="Photo by Johannes Plenio on Unsplash"
                            title="Photo by Johannes Plenio on Unsplash">
                        <img src="{{ url_for('static', filename='images/samples/sunset.jpg') }}" alt="Sunset landscape">
                    </button>

                    <button type="button" class="sample-thumb"
                            data-src="{{ url_for('static', filename='images/samples/abstract.jpg') }}"
                            data-credit="Photo by Milad Fakurian on Unsplash"
                            title="Photo by Milad Fakurian on Unsplash">
                        <img src="{{ url_for('static', filename='images/samples/abstract.jpg') }}" alt="Abstract gradient">
                    </button>

                    <button type="button" class="sample-thumb"
                            data-src="{{ url_for('static', filename='images/samples/portrait.jpg') }}"
                            data-credit="Photo by Slav Romanov on Unsplash"
                            title="Photo by Slav Romanov on Unsplash">
                        <img src="{{ url_for('static', filename='images/samples/portrait.jpg') }}" alt="Fashion portrait">
                    </button>

                    <button type="button" class="sample-thumb"
                            data-src="{{ url_for('static', filename='images/samples/food.jpg') }}"
                            data-credit="Photo by Anna Pelzer on Unsplash"
                            title="Photo by Anna Pelzer on Unsplash">
                        <img src="{{ url_for('static', filename='images/samples/food.jpg') }}" alt="Food flatlay">
                    </button>
                </div>
            </div>
            </section>

            <!-- PREVIEW SECTION - hidden until a file is selected -->
            <section class="preview-section" id="preview-section" hidden>
                <img id="preview-image" src="" alt="Image Preview">

                <!-- Slider for picking how many colors to extract. -->
                <!-- Sits above the action buttons so users set it before extracting. -->
                <div class="slider-group">
                    <label for="num-colors-slider" class="slider-label">
                        palette size: <span id="num-colors-value">8</span> colors
                    </label>
                    <input
                        type="range"
                        id="num-colors-slider"
                        min="5"
                        max="20"
                        value="8"
                        step="1"
                    >
                </div>

                <div class="preview-controls">
                    <button id="extract-button" class="primary-button">Extract colors</button>
                    <button id="reset-button" class="secondary-button">Choose different image</button>
                </div>
            </section>

            <!-- LOADING STATE - hidden until extraction starts -->
            <section class="loading-section" id="loading-section" hidden>
                <div class="spinner"></div>
                <p>Analyzing colors...</p>
            </section>

            <!-- PALETTE RESULTS - hidden until extraction completes -->
            <section class="palette-section" id="palette-section" hidden>
                <div class="palette-header">
                    <h2>Your palette</h2>
                    <button id="palette-reset-button" class="secondary-button">Try another image</button>
                </div>
                <!-- Swatches will be dynamically injected here by main.js -->
                <div class="palette-grid" id="palette-grid"></div>
            </section>

        </main>

        <!-- SITE FOOTER -->
        <footer class="site-footer">
            <p>Built with Python & Flask by <span>Ghaleb Khadra</span> &middot; {{ current_year }}</p>
        </footer>

        <!-- TOAST - floating notification for copy confirmations, errors, etc. -->
        <div class="toast" id="toast"></div>

        <!-- Javascript -->
        <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>

    </body>
</html>
